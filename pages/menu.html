<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Menú Gamer</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../css/menuStyle.css">
</head>

<body>

    <div class="overlay">

        <!-- 🔝 Banner -->
        <div id="topBar" class="d-flex justify-content-between align-items-center">
            <div>
                🎮 Bienvenido, <span id="lbUsername"></span>
            </div>
            <button id="logoutBtn" class="btn btn-sm">Cerrar sesión</button>
        </div>

        <!-- 📋 Opciones -->
        <div class="container menu-container">
            <div id="menuOpciones" class="row g-4 justify-content-center"></div>
        </div>

        <!-- 🔥 Contenido dinámico -->
        <div class="container mt-4">
            <div id="contenido" class="p-4"></div>
        </div>

    </div>
    <div class="modal fade" id="modalConfirmacion" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-modal">

                <div class="modal-header border-0">
                    <h5 class="modal-title text-info">💰 Confirmación de compra</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body text-center">
                    <p id="textoModal" class="fs-5"></p>
                </div>

                <div class="modal-footer border-0 justify-content-center">
                    <button id="btnCancelar" class="btn btn-outline-light">Cancelar</button>
                    <button id="btnAceptar" class="btn btn-info">Aceptar</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAlquiler" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-modal">

                <div class="modal-header border-0">
                    <h5 class="modal-title text-info">🎮 Alquiler de videojuego</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <p id="nombreJuego" class="text-center fw-bold"></p>

                    <div class="mb-3">
                        <label>Días de alquiler</label>
                        <input type="number" id="inputDias" class="form-control" min="1" placeholder="Ej: 3">
                    </div>

                    <p id="precioCalculado" class="text-center text-info"></p>

                </div>

                <div class="modal-footer border-0 justify-content-center">
                    <button id="btnCancelarAlquiler" class="btn btn-outline-light">Cancelar</button>
                    <button id="btnConfirmarAlquiler" class="btn btn-info">Confirmar</button>
                </div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="modalAprobacion" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content custom-modal">

                <div class="modal-header border-0">
                    <h5 class="modal-title text-info">📋 Aprobar videojuego</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body">

                    <p id="infoJuego"></p>

                    <div class="mb-3">
                        <label>Precio</label>
                        <input type="number" id="inputPrecio" class="form-control" placeholder="Ingrese precio">
                    </div>

                </div>

                <div class="modal-footer border-0 justify-content-center">
                    <button id="btnCancelarAprobacion" class="btn btn-outline-light">Cancelar</button>
                    <button id="btnGuardarAprobacion" class="btn btn-info">Guardar</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->
    <script src="../js/menu.js"></script>

    <script>


        // Cerrar sesión
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('usuario');
            window.location.href = "../index.html";
        });

    </script>

</body>

</html>
